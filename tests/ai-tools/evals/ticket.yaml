resource: ticket
scenarios:

  # -- Metadata / orientation -----------------------------------------------------
  - id: ticket-meta-001
    persona: any
    question: "What fields are available when searching for tickets?"
    successDefinition: >
      LLM calls describeFields with mode='read'. Response contains fields[] non-empty,
      each entry has at least id, type, and name properties. Well-known fields such as
      id, title, status, companyID are present in the list. Summary states total field count.
      LLM must NOT fabricate field names — it must cite fields from the actual response.

  - id: ticket-meta-002
    persona: any
    question: "What values are valid for ticket status?"
    successDefinition: >
      LLM calls listPicklistValues with fieldId='status' (or correct casing).
      picklistValues[] non-empty, each entry has id (numeric) and label (string).
      All returned values are active — the API pre-filters to active only.
      Summary states the count of valid status values and lists some by name.

  - id: ticket-meta-003
    persona: any
    question: "How does the getMany operation work for tickets?"
    successDefinition: >
      LLM calls describeOperation with targetOperation='getMany'. operationDoc present
      as object with purpose field. Summary describes the operation in plain English.
      Response does not fabricate capabilities not in the doc.

  # -- SDM ------------------------------------------------------------------------
  - id: ticket-sdm-001
    persona: sdm
    question: "Show me all open tickets across the team right now"
    successDefinition: >
      LLM calls getMany with status filter for open state. records[] present or
      clear empty-state error. If hasMore true, nextOffset present and actionable.
      Summary states count + pagination signal. 'Team' scope means all tickets
      visible to the API user — no team-specific filter required.

  - id: ticket-sdm-002
    persona: sdm
    question: "Which high-priority tickets are closest to their due date?"
    successDefinition: >
      LLM calls getMany with a priority filter (value 4 or 5, or the numeric equivalent of
      high/critical after a listPicklistValues lookup). records[] returned and contains
      dueDateTime field. Summary identifies tickets by name/number and states their due dates.
      LLM may also filter by open status but is not required to — it MUST produce a final
      response with results within 10 tool calls. LLM must NOT fabricate SLA breach status.

  - id: ticket-sdm-003
    persona: sdm
    question: "How many tickets are currently open?"
    successDefinition: >
      LLM calls count with a status=open filter. matchCount is non-negative integer.
      Summary states count in plain English with filter condition mentioned.

  - id: ticket-sdm-004
    persona: sdm
    question: "Show me tickets that have no assigned resource"
    successDefinition: >
      LLM calls getMany using the 'notExist' operator on assignedResourceID (not eq with
      null/empty). records[] present or NO_RESULTS_FOUND with actionable nextAction.
      Summary explicitly reflects the unassigned filter condition.

  - id: ticket-sdm-005
    persona: sdm
    question: "Show me tickets created more than 7 days ago."
    successDefinition: >
      LLM calls getMany with a date filter on createDate using 'lt' operator with a
      threshold approximately 7 days ago (ISO date string, no status filter required).
      records[] returned or NO_RESULTS_FOUND. createDate field visible in records.
      Summary states count and references the 7-day timeframe.
      LLM must NOT call listPicklistValues — the question has no status requirement.

  # -- Engineer — own tickets -----------------------------------------------------
  - id: ticket-eng-001
    persona: engineer-own
    question: "My resource ID is {TEST_RESOURCE_ID}. What tickets are currently assigned to me?"
    successDefinition: >
      LLM calls getMany with assignedResourceID={TEST_RESOURCE_ID} filter (numeric).
      records[] returned or NO_RESULTS_FOUND error. Summary states count or explains
      no results. LLM must NOT call whoAmI — resource ID is already provided in the question.

  - id: ticket-eng-002
    persona: engineer-own
    question: "My resource ID is {TEST_RESOURCE_ID}. Show me my highest priority open tickets."
    successDefinition: >
      LLM calls getMany with assignedResourceID={TEST_RESOURCE_ID} filter and at least
      one additional narrowing filter (priority, status, or both). records[] returned or
      NO_RESULTS_FOUND. Summary mentions the resource context and narrowing criteria.
      LLM must NOT call whoAmI — resource ID is already provided.

  - id: ticket-eng-003
    persona: engineer-own
    question: "My resource ID is {TEST_RESOURCE_ID}. Are there any tickets I haven't updated in the last 48 hours?"
    successDefinition: >
      LLM calls getMany with assignedResourceID={TEST_RESOURCE_ID} filter AND a date
      filter on lastActivityDate using 'lt' operator with a threshold approximately
      48 hours ago. records[] or NO_RESULTS_FOUND. Summary states timeframe and count.
      LLM must NOT call whoAmI — resource ID is already provided.

  # -- Engineer — accepting handed-over ticket ------------------------------------
  - id: ticket-handover-001
    persona: engineer-handover
    question: "Give me the full details of ticket {TEST_TICKET_NUMBER}"
    successDefinition: >
      LLM calls get or getMany using the ticketNumber {TEST_TICKET_NUMBER}. record{} returned
      with at minimum: id, ticketNumber, title, status, priority, assignedResourceID,
      companyID, createDate all present. ticketNumber in response matches {TEST_TICKET_NUMBER}.
      Summary identifies ticket by number and title.

  - id: ticket-handover-002
    persona: engineer-handover
    question: "What is the SLA status of ticket {TEST_TICKET_NUMBER}?"
    successDefinition: >
      LLM calls slaHealthCheck with ticketNumber='{TEST_TICKET_NUMBER}'. Response contains
      record.isBreached (boolean). Summary states ticket reference and explicit
      breached/not-breached status. If wallClockRemainingHours is present and non-null,
      the model should mention hours. If null (already breached), stating "BREACHED" is
      sufficient — no hours are required. LLM must NOT hallucinate a specific hours value.

  - id: ticket-handover-003
    persona: engineer-handover
    question: "Get a summary of ticket {TEST_TICKET_NUMBER} including its current state"
    successDefinition: >
      LLM calls summary with ticketNumber='{TEST_TICKET_NUMBER}'. ticketSummary{} present
      with core and computed sub-objects. Summary states ticket number, title,
      age in hours, and SLA status. LLM does NOT need to make additional calls.

  - id: ticket-handover-004
    persona: engineer-handover
    question: "I need to find a ticket but only have a partial title — search for tickets containing 'VPN'"
    successDefinition: >
      LLM calls getMany with filter_field='title', filter_op='contains', filter_value='VPN'.
      records[] returned or NO_RESULTS_FOUND with actionable guidance. If results present,
      title field visible in each record to confirm relevance. Summary reflects the
      contains filter applied.

  # -- Account Manager — QBR prep -------------------------------------------------
  - id: ticket-am-qbr-001
    persona: am-qbr
    question: "How many tickets has {TEST_COMPANY_NAME} had this quarter?"
    successDefinition: >
      LLM calls count with companyID filter (resolving '{TEST_COMPANY_NAME}' to a numeric ID)
      and a createDate filter covering the current quarter. matchCount returned.
      Summary states count + company reference + date range.
      resolvedLabels present showing '{TEST_COMPANY_NAME}' → numeric ID resolution.

  - id: ticket-am-qbr-002
    persona: am-qbr
    question: "Show me all high-priority tickets for {TEST_COMPANY_NAME} in the last 90 days"
    successDefinition: >
      LLM calls getMany with companyID (resolved from '{TEST_COMPANY_NAME}'), priority filter,
      and createDate filter for last 90 days. records[] returned. Summary states count
      + all filter conditions. hasMore + nextOffset present if results paginated.
      resolvedLabels present if company name was resolved.

  - id: ticket-am-qbr-003
    persona: am-qbr
    question: "Are there any open tickets for {TEST_COMPANY_NAME} right now?"
    successDefinition: >
      LLM calls getMany or count with companyID (resolved) + status=open filter.
      If zero results, NO_RESULTS_FOUND error includes nextAction suggesting checking
      status picklist values via listPicklistValues. resolvedLabels present if company
      name resolved.

  - id: ticket-am-qbr-004
    persona: am-qbr
    question: "Which of my accounts have the most open tickets?"
    successDefinition: >
      LLM must NOT fabricate aggregated data or present made-up per-account counts.
      The Autotask API has no server-side groupBy. LLM should either: (a) explain the
      limitation and propose running count per company individually, or (b) ask the user
      for their account list to proceed. nextAction must be specific and actionable.
      Any fabricated ranking or count is a failure.

  # -- Account Manager — BAU ------------------------------------------------------
  - id: ticket-am-bau-001
    persona: am-bau
    question: "Are there any new tickets from {TEST_COMPANY_NAME} today?"
    successDefinition: >
      LLM calls getMany or count with companyID (resolved from '{TEST_COMPANY_NAME}') AND
      a date filter for today — either via: (a) createDate field with 'gte'/'gt' operator,
      or (b) the `since` parameter set to today's date. Both approaches are correct.
      Summary states count + date reference. resolvedLabels present if company name resolved.

  - id: ticket-am-bau-002
    persona: am-bau
    question: "Show me tickets for {TEST_COMPANY_NAME} waiting on customer response"
    successDefinition: >
      LLM calls getMany with companyID (resolved) + status filter for a waiting/pending
      customer state. Status picklist values vary by tenant — LLM should either call
      listPicklistValues first to find the correct status value, or use label resolution.
      resolvedLabels present if any labels were resolved. Summary reflects both conditions.

  - id: ticket-am-bau-003
    persona: am-bau
    question: "Are there any escalated tickets for {TEST_COMPANY_NAME}?"
    successDefinition: >
      LLM calls getMany with companyID (resolved) + priority filter for critical/high,
      or an escalation-specific field if one exists. LLM should call describeFields or
      listPicklistValues to verify field/value before filtering — guessing picklist values
      is a failure. If zero results, NO_RESULTS_FOUND with nextAction to verify correct
      field and picklist values.

  # -- Error recovery -------------------------------------------------------------
  - id: ticket-error-001
    persona: any
    question: "Show me ticket number 99999999"
    successDefinition: >
      LLM calls get with id=99999999. Response is ENTITY_NOT_FOUND error. LLM reads
      nextAction and follows it — calls getMany with a filter to locate the actual ticket
      rather than reporting failure. The follow-up getMany call (not the error itself)
      is the success signal: LLM used nextAction to self-correct.

  - id: ticket-error-002
    persona: any
    question: "Show me open tickets with status 'Borked'"
    successDefinition: >
      LLM calls getMany or count with status='Borked'. Response is either
      INVALID_PICKLIST_VALUE or NO_RESULTS_FOUND. LLM reads nextAction and follows it —
      calls listPicklistValues for the status field to find valid values, then retries
      with a valid status. Recovery to a successful second call is the success signal.

  # -- Multi-step -----------------------------------------------------------------
  - id: ticket-multi-001
    persona: engineer-handover
    question: "Find the most recently created ticket for {TEST_COMPANY_NAME} and show me its SLA status"
    successDefinition: >
      LLM makes two calls: (1) getMany with companyID (resolved from '{TEST_COMPANY_NAME}') and
      recency or createDate sort to find recent tickets; (2) slaHealthCheck on the
      returned ticket ID or ticketNumber. Final response contains record.isBreached and
      wallClockRemainingHours. resolvedLabels present for company resolution. LLM must
      NOT fabricate SLA data from the getMany response alone — it must call slaHealthCheck.

  # -- L1/L2 Engineer — frontline triage -----------------------------------------
  - id: ticket-l1l2-001
    persona: l1-l2-engineer
    question: "What new tickets came into the queue in the last hour?"
    successDefinition: >
      LLM calls getMany with a 1-hour time boundary — either via: (a) createDate filter
      with 'gte' operator set ~1 hour ago, or (b) recency='last_1h' (both are equivalent
      time windows). records[] returned or NO_RESULTS_FOUND. Summary states count and
      references the 1-hour time window. LLM must NOT return all tickets without a time filter.

  - id: ticket-l1l2-002
    persona: l1-l2-engineer
    question: "Show me unassigned tickets I can pick up"
    successDefinition: >
      LLM calls getMany with 'notExist' operator on assignedResourceID AND a status filter
      excluding closed/complete (or filtering for new/open). records[] returned with
      status and priority visible. Summary states count and reflects both conditions.
      LLM must NOT assume closed tickets are pickable — open/new filter is required.

  - id: ticket-l1l2-003
    persona: l1-l2-engineer
    question: "Has anyone else had a ticket about 'password reset' recently?"
    successDefinition: >
      LLM calls getMany with filter_field='title' and filter_op='contains' using the
      keyword, plus a createDate filter bounding to 'recently' (e.g. last 30–90 days).
      records[] returned or NO_RESULTS_FOUND. Summary states count and lists titles for
      pattern recognition. LLM must NOT invent similar tickets — only return API results.

  - id: ticket-l1l2-004
    persona: l1-l2-engineer
    question: "What priority is ticket {TEST_TICKET_NUMBER} and what's its current status?"
    successDefinition: >
      LLM calls get or getMany using ticketNumber={TEST_TICKET_NUMBER}. record{} returned
      with priority and status fields visible. Summary clearly states both priority and
      status by name (LLM may listPicklistValues first if needed to label numeric IDs).
      LLM must NOT guess what numeric status/priority values mean.

  - id: ticket-l1l2-005
    persona: l1-l2-engineer
    question: "Update ticket {TEST_TICKET_NUMBER} to set status to 'In Progress'"
    successDefinition: >
      LLM calls update with id or ticketNumber={TEST_TICKET_NUMBER} and status='In Progress'
      (or numeric equivalent). Two valid outcomes: (a) write succeeds — response contains id
      and record{} with new status, resolvedLabels present for 'In Progress' → numeric ID;
      (b) write blocked by readonly endpoint — LLM explains the operation was blocked/refused,
      does NOT fabricate a success, and does NOT attempt a different operation instead.
      Giving a clear honest explanation of write being blocked counts as PASS.

  - id: ticket-l1l2-006
    persona: l1-l2-engineer
    question: "I'm stuck on a printer issue — show me tickets from the last 60 days with 'printer' in the title"
    successDefinition: >
      LLM calls getMany with filter_field='title', filter_op='contains', filter_value='printer'
      plus a createDate filter bounding to last 60 days. records[] returned or NO_RESULTS_FOUND.
      Summary states count + time window. LLM must NOT fabricate resolution notes — only
      the ticket list is expected from this call.

  # -- Senior Engineer — escalations and patterns --------------------------------
  - id: ticket-senior-001
    persona: senior-engineer
    question: "Are there any SLA-breached tickets I should look at right now?"
    successDefinition: >
      LLM calls getMany with a status filter for open states AND a dueDateTime filter
      using 'lt' operator with current datetime. records[] returned or NO_RESULTS_FOUND.
      Summary states count and reflects breach-risk condition. LLM must NOT call
      slaHealthCheck per ticket here — a list-level filter on dueDateTime is correct for
      bulk breach triage. Fabricating breach status is a failure.

  - id: ticket-senior-002
    persona: senior-engineer
    question: "Show me tickets escalated in the last 7 days"
    successDefinition: >
      LLM calls describeFields or listPicklistValues to verify whether an escalation field
      (e.g. priority change, queue change, or an explicit escalation flag) exists. Then
      calls getMany with the appropriate filter plus a createDate or lastActivityDate
      filter bounding to 7 days. records[] returned or NO_RESULTS_FOUND. LLM must NOT
      guess the escalation field name — verification via describeFields is required.

  - id: ticket-senior-003
    persona: senior-engineer
    question: "Give me the full summary and history of ticket {TEST_TICKET_NUMBER}"
    successDefinition: >
      LLM calls summary with ticketNumber='{TEST_TICKET_NUMBER}'. ticketSummary{} present
      with core and computed sub-objects. Summary states ticket number, title, age,
      SLA status, and any notable timeline signals surfaced by the summary operation.
      LLM does NOT need separate get/describeFields calls — summary is sufficient.

  - id: ticket-senior-004
    persona: senior-engineer
    question: "Are there recurring issues across {TEST_COMPANY_NAME_2} — any similar tickets in the last 90 days?"
    successDefinition: >
      LLM calls getMany with companyID (resolved from '{TEST_COMPANY_NAME_2}') and createDate filter for
      last 90 days. records[] returned with title field visible so pattern analysis is
      possible. Summary states count and points out that pattern identification requires
      looking at titles/issueType. resolvedLabels present for company resolution.
      LLM must NOT fabricate patterns not in the returned records.

  - id: ticket-senior-005
    persona: senior-engineer
    question: "How many tickets has engineer Jane Doe resolved this week?"
    successDefinition: >
      LLM calls count with assignedResourceID (resolved from 'Jane Doe' via label resolution
      or prior resource lookup) AND a status filter for complete/resolved AND a
      completedDate or lastActivityDate filter for this week. matchCount returned.
      Summary states count + engineer name + time window. resolvedLabels present for
      resource resolution. LLM must NOT fabricate productivity metrics.

  - id: ticket-senior-006
    persona: senior-engineer
    question: "Show me critical priority tickets across all clients that are older than 3 days"
    successDefinition: >
      LLM calls getMany with priority filter for critical AND createDate filter using 'lt'
      operator with a 3-day-ago threshold AND an open-status filter (excluding closed).
      records[] with priority, createDate, companyID visible. If hasMore, nextOffset
      present. Summary states count and reflects all three conditions. LLM must NOT
      mix closed tickets into the 'still open and aging' answer.

  # -- Service Desk Manager — queue health and reporting -------------------------
  - id: ticket-sdm-mgr-001
    persona: service-desk-manager
    question: "Give me the team's workload right now — how many open tickets per engineer?"
    successDefinition: >
      LLM must NOT fabricate per-engineer aggregates. The Autotask API has no server-side
      groupBy. LLM should either: (a) explain the limitation and propose running count
      per assignedResourceID individually, or (b) ask for the engineer list to iterate.
      Any fabricated per-engineer count is a failure. nextAction must be specific.

  - id: ticket-sdm-mgr-002
    persona: service-desk-manager
    question: "Which tickets are at risk of SLA breach in the next 4 hours?"
    successDefinition: >
      LLM calls getMany with open-status filter AND dueDateTime filter using 'lt' operator
      with a threshold 4 hours in the future AND 'gt' operator with current datetime
      (exclude already-breached). records[] returned with dueDateTime visible. Summary
      states count and reflects the at-risk window. LLM must NOT confuse already-breached
      (dueDateTime in past) with at-risk (dueDateTime approaching but not yet past).

  - id: ticket-sdm-mgr-003
    persona: service-desk-manager
    question: "How many tickets did the team close yesterday?"
    successDefinition: >
      LLM calls count with a status filter for closed/complete AND a completedDate or
      lastActivityDate filter for yesterday (24-hour window). matchCount returned.
      Summary states count + date. LLM must NOT use createDate — closed date is the
      correct field for closure velocity metrics.

  - id: ticket-sdm-mgr-004
    persona: service-desk-manager
    question: "Any unassigned high-priority tickets I need to route right now?"
    successDefinition: >
      LLM calls getMany with 'notExist' operator on assignedResourceID AND priority
      filter (high/critical) AND open-status filter. records[] returned or NO_RESULTS_FOUND
      with actionable nextAction. Summary states count and reflects all three conditions.
      This is an actionable routing alert — LLM should call out each ticket if results
      are small.

  - id: ticket-sdm-mgr-005
    persona: service-desk-manager
    question: "What's the ticket volume trend — how many tickets were created this week vs last week?"
    successDefinition: >
      LLM calls count TWICE — once with createDate filter for this week, once for last
      week. Each returns matchCount. Summary compares both counts and states the
      percentage or absolute delta. LLM must NOT fabricate a trend from a single count
      or invent numbers for the second period. Two count calls are required.

  - id: ticket-sdm-mgr-006
    persona: service-desk-manager
    question: "Show me tickets that have been in 'Waiting on Customer' status for more than 14 days"
    successDefinition: >
      LLM resolves 'Waiting on Customer' via label resolution or calls listPicklistValues
      first to find the correct status value. Then calls getMany with status filter AND
      lastActivityDate filter using 'lt' operator with 14-days-ago threshold. records[]
      returned or NO_RESULTS_FOUND. resolvedLabels present if status was label-resolved.
      Summary reflects both conditions. LLM must NOT guess the picklist value.

  # -- Account Manager — extended relationship scenarios -------------------------
  - id: ticket-am-ext-001
    persona: account-manager
    question: "I've got a call with {TEST_COMPANY_NAME} tomorrow — what open issues should I be aware of?"
    successDefinition: >
      LLM calls getMany with companyID (resolved from '{TEST_COMPANY_NAME}') AND open-status filter.
      records[] returned with title, priority, status, createDate, assignedResourceID all
      visible so the AM can brief the client. Summary lists high-priority items first or
      states all open counts. resolvedLabels present. LLM must NOT summarise with made-up
      ticket details.

  - id: ticket-am-ext-002
    persona: account-manager
    question: "How long have the oldest open tickets for {TEST_COMPANY_NAME} been sitting?"
    successDefinition: >
      LLM calls getMany with companyID (resolved) AND open-status filter, sorted or
      filtered so oldest surface first. records[] returned with createDate visible.
      Summary states the age of the oldest tickets in days or hours. resolvedLabels
      present. LLM must NOT fabricate age — it must compute from returned createDate.

  - id: ticket-am-ext-003
    persona: account-manager
    question: "Has {TEST_COMPANY_NAME} had any critical-priority tickets in the last 6 months?"
    successDefinition: >
      LLM calls count or getMany with companyID (resolved) AND priority filter for
      critical AND createDate filter for last 6 months. matchCount or records[] returned.
      Summary states count and time window. resolvedLabels present. If zero, summary
      should call that out as a positive account health signal.

  - id: ticket-am-ext-004
    persona: account-manager
    question: "Pull up the most recent 10 tickets for {TEST_COMPANY_NAME} so I can review recent activity"
    successDefinition: >
      LLM calls getMany with companyID (resolved) AND recency mode or a createDate sort,
      with limit=10. records[] returned (up to 10), most-recent first. Summary states
      count and that these are the most recent. resolvedLabels present.

  - id: ticket-am-ext-005
    persona: account-manager
    question: "Is {TEST_COMPANY_NAME}'s ticket volume higher this month compared to last month?"
    successDefinition: >
      LLM calls count TWICE with companyID (resolved) — once with createDate filter for
      this month, once for last month. Two matchCount values returned. Summary compares
      both and states the delta. resolvedLabels present. LLM must NOT fabricate one
      period's count; both must come from real count calls.

  - id: ticket-am-ext-006
    persona: account-manager
    question: "Are there any tickets for {TEST_COMPANY_NAME} currently waiting on us (not the customer)?"
    successDefinition: >
      LLM calls listPicklistValues for status first (or uses label resolution) to identify
      statuses that indicate 'waiting on engineer' vs 'waiting on customer'. Then calls
      getMany with companyID (resolved) AND the appropriate status filter. records[]
      returned or NO_RESULTS_FOUND. resolvedLabels present for company and any status
      resolutions. LLM must NOT guess which status ID means 'waiting on us'.

  # -- Sales Support — pre-sales / renewal diligence -----------------------------
  - id: ticket-sales-001
    persona: sales-support
    question: "Before we quote a contract renewal for {TEST_COMPANY_NAME}, how many tickets have they raised in the past 12 months?"
    successDefinition: >
      LLM calls count with companyID (resolved from '{TEST_COMPANY_NAME}') AND createDate filter
      for last 12 months. matchCount returned. Summary states count + company + time
      window. resolvedLabels present. LLM must NOT fabricate volume figures or claim
      'unknown' when count is available.

  - id: ticket-sales-002
    persona: sales-support
    question: "What's the service quality looked like for {TEST_COMPANY_NAME_2} — any SLA breaches in the last year?"
    successDefinition: >
      LLM calls getMany or count with companyID (resolved) AND a dueDateTime filter using
      'lt' operator AND a status filter for closed (so only breaches that actually
      occurred). Alternatively LLM may use slaHasBeenMet field if present in describeFields.
      Summary states count and the limitation that computed breach history depends on
      which fields are available. resolvedLabels present.

  - id: ticket-sales-003
    persona: sales-support
    question: "What ticket categories does {TEST_COMPANY_NAME} raise most often? I want to scope the next contract."
    successDefinition: >
      LLM must NOT fabricate a breakdown — the API has no server-side groupBy. LLM should
      explain the limitation, propose either (a) pulling a sample of recent tickets via
      getMany and reviewing issueType/title fields, or (b) running count per category
      individually after calling listPicklistValues for issueType. nextAction must be
      specific. resolvedLabels present if company resolved.

  - id: ticket-sales-004
    persona: sales-support
    question: "Has the new client {TEST_COMPANY_NAME_2} been raising a lot of tickets since onboarding?"
    successDefinition: >
      LLM should first ask for or infer the onboarding date (if unknown it should ask).
      Assuming a date is provided, LLM calls count with companyID (resolved from '{TEST_COMPANY_NAME_2}')
      AND createDate filter from the onboarding date forward. matchCount returned. Summary
      states count and date window. resolvedLabels present. LLM must NOT guess the
      onboarding date.

  - id: ticket-sales-005
    persona: sales-support
    question: "How many critical-priority tickets has {TEST_COMPANY_NAME} opened this year?"
    successDefinition: >
      LLM calls count with companyID (resolved) AND priority filter for critical AND
      createDate filter for this year. matchCount returned. Summary states count +
      company + priority + time window. resolvedLabels present.

  - id: ticket-sales-006
    persona: sales-support
    question: "I need a sample of the last 20 tickets for {TEST_COMPANY_NAME_2} so I can review delivery quality"
    successDefinition: >
      LLM calls getMany with companyID (resolved from '{TEST_COMPANY_NAME_2}') AND recency mode or
      createDate sort with limit=20. records[] returned (up to 20) with title, priority,
      status, createDate visible. Summary states count and that records are ordered
      most-recent first. resolvedLabels present.

  # -- Owner — business-level KPI views ------------------------------------------
  - id: ticket-owner-001
    persona: owner
    question: "What's the total ticket volume across the business this month?"
    successDefinition: >
      LLM calls count with createDate filter for this month (no company filter).
      matchCount returned. Summary states count + time window. LLM must NOT add
      speculative trend commentary without a second data point.

  - id: ticket-owner-002
    persona: owner
    question: "How many SLA breaches have we had in the last 30 days?"
    successDefinition: >
      LLM calls count with a dueDateTime filter using 'lt' operator AND a status filter
      for closed AND createDate or completedDate filter for last 30 days. Alternatively
      LLM may use an explicit slaHasBeenMet field if present in describeFields.
      matchCount returned. Summary states count + time window + the filter logic used.
      LLM must NOT fabricate a breach number.

  - id: ticket-owner-003
    persona: owner
    question: "Which clients generate the most tickets — I need to understand my top accounts by support load"
    successDefinition: >
      LLM must NOT fabricate per-client ranking — the API has no server-side groupBy.
      LLM should explain the limitation and either (a) ask for a shortlist of companies
      to iterate count for each, or (b) propose pulling a recent ticket sample via
      getMany for manual review. nextAction must be specific and actionable.

  - id: ticket-owner-004
    persona: owner
    question: "Compare ticket volume this quarter vs the same quarter last year"
    successDefinition: >
      LLM calls count TWICE — once with createDate filter for current quarter, once for
      same quarter last year. Two matchCount values returned. Summary compares both and
      states the delta (absolute and/or percentage). LLM must NOT fabricate one period's
      count — both must be real count calls.

  - id: ticket-owner-005
    persona: owner
    question: "Are we seeing more critical-priority tickets than usual this month?"
    successDefinition: >
      LLM calls count TWICE with priority filter for critical — once with createDate
      filter for this month, once for a prior reference month (e.g. last month).
      Two matchCount values returned. Summary compares and states whether critical
      volume is up or down. LLM must NOT fabricate a baseline.

  - id: ticket-owner-006
    persona: owner
    question: "How many tickets are currently open across the whole business?"
    successDefinition: >
      LLM calls count with open-status filter only (no company filter). matchCount
      returned. Summary states count plainly. If LLM cannot determine which status IDs
      are 'open' without help, it should call listPicklistValues first — not guess.

  # -- Additional multi-step scenarios -------------------------------------------
  - id: ticket-multi-002
    persona: service-desk-manager
    question: "Show me all open critical tickets and flag which ones are already breached"
    successDefinition: >
      LLM makes two or more calls: (1) getMany with priority filter for critical AND
      open-status filter — records[] returned with id/ticketNumber/dueDateTime visible;
      (2) for each returned ticket (or a sample), slaHealthCheck to determine breach
      status OR use the returned dueDateTime compared to current datetime to infer.
      Summary states total count and breach count. LLM must NOT fabricate breach status
      without either slaHealthCheck calls or explicit dueDateTime comparison.

  - id: ticket-multi-003
    persona: account-manager
    question: "Find {TEST_COMPANY_NAME}'s oldest open ticket and give me its full summary"
    successDefinition: >
      LLM makes two calls: (1) getMany with companyID (resolved from '{TEST_COMPANY_NAME}') AND
      open-status filter, sorted by createDate ascending (or equivalent to surface oldest)
      with limit=1 — returns records[] with at least one ticket; (2) summary with
      ticketNumber or id from step 1. ticketSummary{} present in final response. Summary
      states ticket number, title, age, and SLA status. resolvedLabels present for company
      resolution. LLM must NOT fabricate summary data from the getMany response alone.

  - id: ticket-multi-004
    persona: senior-engineer
    question: "Find any VPN-related tickets opened in the last 30 days and show me the most recent one's full details"
    successDefinition: >
      LLM makes two calls: (1) getMany with filter_field='title', filter_op='contains',
      filter_value='VPN' AND createDate filter for last 30 days, sorted or using recency
      — records[] returned; (2) get or summary on the most recent ticket's id/ticketNumber.
      Final response contains record{} or ticketSummary{} with full ticket context.
      Summary states the pattern match count and the chosen ticket's details. LLM must
      NOT skip step 2 or fabricate details from the list view.

  - id: ticket-multi-005
    persona: l1-l2-engineer
    question: "Pick up the oldest unassigned open ticket, then show me its details so I can start work"
    successDefinition: >
      LLM makes two calls: (1) getMany with 'notExist' on assignedResourceID AND open-status
      filter, sorted by createDate ascending with limit=1 — records[] returned with id/
      ticketNumber; (2) get or summary on that ticket. Final response contains record{}
      or ticketSummary{} with full context. Summary states the ticket number and
      essential context (title, priority, company). LLM must NOT claim the ticket was
      assigned unless the user explicitly asks for an update call.

  - id: ticket-multi-006
    persona: owner
    question: "Find this month's worst-performing client by ticket volume — who's raising the most?"
    successDefinition: >
      LLM must NOT fabricate a per-client ranking. The API has no server-side groupBy.
      LLM should explain the limitation, then either (a) ask the user for a shortlist
      of client names and iterate count calls per company (multi-step), or (b) pull a
      getMany sample for this month and note that full ranking requires per-company
      counts. If the user supplies a shortlist, LLM makes count calls per companyID
      (resolved). Final summary must only reflect real count data.
